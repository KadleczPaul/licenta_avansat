<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Transport MS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --navy-blue: #001f3f;
            --dark-grey: #343a40;
        }
        body {
            background-color: var(--navy-blue);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            background: white;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 400px;
        }
        .btn-navy {
            background-color: var(--navy-blue);
            color: white;
            border: none;
            transition: 0.3s;
        }
        .btn-navy:hover {
            background-color: #003366;
            color: white;
            transform: translateY(-2px);
        }
        .form-control:focus {
            border-color: var(--navy-blue);
            box-shadow: 0 0 0 0.2rem rgba(0, 31, 63, 0.25);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-dark">TRANSPORT <span style="color: var(--navy-blue);">MS</span></h2>
            <p class="text-muted small">Please enter your credentials to log in.</p>
        </div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-danger py-2 px-3 small mb-3" role="alert">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            <div class="mb-3">
                <label class="form-label small fw-bold text-secondary">Username</label>
                <input type="text" name="username" class="form-control form-control-lg" placeholder="e.g. admin" required>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold text-secondary">Password</label>
                <input type="password" name="password" class="form-control form-control-lg" placeholder="••••••••" required>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-navy btn-lg fw-bold">SIGN IN</button>
            </div>
        </form>

        <div class="text-center mt-4">
            <hr>
            <p class="text-muted extra-small" style="font-size: 0.75rem;">
                Authorized access only. All actions are logged.
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
